{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <h1>🔑 修改密码</h1>
    
    <form method="POST" class="auth-form">
        {% if current_user.is_super_admin() %}
        <div class="alert alert-info">
            💡 超级管理员可以直接修改其他用户的密码，无需输入原密码
        </div>
        
        <div class="form-group">
            <label for="target_username">要修改的用户名（留空则修改自己的密码）</label>
            <input type="text" name="target_username" id="target_username" placeholder="输入用户名">
        </div>
        {% else %}
        <div class="form-group">
            <label for="old_password">原密码</label>
            <input type="password" name="old_password" id="old_password" required autofocus>
        </div>
        {% endif %}
        
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" name="new_password" id="new_password" required minlength="6">
            <small>密码长度至少为 6 位</small>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="6">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">💾 保存新密码</button>
            <a href="{{ url_for('tie.dashboard') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
